# Biweekly full EPA refresh — cloud replacement for the MacBook LaunchAgent
# (com.ipi.full-refresh). Mirrors refresh.sh step-for-step.
#
# Requires the same repository secrets as daily-incidents.yml.
name: Full EPA data refresh

on:
  schedule:
    - cron: "30 10 1,15 * *"   # 1st + 15th, 10:30 UTC ≈ 6:30am ET
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: ipi_consent_decree_etl
    env:
      GCP_PROJECT_ID: ipi-consent-decree-dashboard
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -q -r requirements.txt openpyxl

      - name: Write service-account key
        run: printf '%s' '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa.json

      - name: "[1/8] Bulk ETL (EPA download + BigQuery load)"
        run: python etl_bulk.py

      - name: "[2/8] Seed data corrections"
        run: python seed_data.py

      - name: "[3/8] Deadline corrections"
        run: python deadline_lookup.py

      - name: "[4/8] Census population fill-in"
        run: python populate_population.py --update

      - name: "[5/8] Derived columns (signals + size tiers)"
        run: python backfill_signals.py

      - name: "[6/8] Incident scan (news + NRC + FEMA)"
        continue-on-error: true
        run: |
          python incident_monitor.py
          python structured_incidents.py

      - name: "[7/8] Target list export + geo enrichment"
        run: |
          python export_targets.py
          python enrich_geo.py

      - name: "[8/8] Data validation (auto-fix)"
        continue-on-error: true
        run: python validate_data.py --fix

      - name: Scrub credentials
        if: always()
        run: rm -f /tmp/gcp-sa.json
